name: Deploy to VPS

on:
  push:
    branches: [ master ]   

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 185.38.84.236
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /opt/laba3-api
            git pull origin master
            source venv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart laba3-api
